name: site

# Regenerate docs/index.html whenever the index changes, so a published
# model shows up on the site without any manual step. No-op when the
# publisher already ran scripts/build_site.py themselves.

on:
  push:
    branches: [main]
    paths: ['index/**', 'scripts/build_site.py']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/build_site.py
      - name: mirror index.json to R2 (off-GitHub, China-reachable)
        run: npx -y wrangler@4 r2 object put unmuzzle/index.json --file index/index.json --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: mirror the site itself to R2
        run: npx -y wrangler@4 r2 object put unmuzzle/index.html --file docs/index.html --remote --content-type text/html
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: commit if changed
        run: |
          if git diff --quiet docs/; then
            echo "site already up to date"
          else
            git config user.name "unmuzzle-bot"
            git config user.email "unmuzzle-bot@users.noreply.github.com"
            git add docs/index.html
            git commit -m "Regenerate site from index [skip ci]"
            git push
          fi
